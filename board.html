<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0F6B41" />
  <title>실시간 질문 보드 · KIFC 창립 기념 포럼</title>
  <link rel="icon" href="assets/logo-color.png" />
  <meta name="robots" content="noindex" />

  <link rel="stylesheet" href="assets/tokens.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" />

  <style>
    html, body { margin: 0; padding: 0; background: var(--bg); font-family: var(--font-sans); color: var(--fg); }
    #root { min-height: 100vh; }
    .material-symbols-rounded {
      font-family: 'Material Symbols Rounded'; font-weight: normal; font-style: normal;
      font-size: 24px; display: inline-block; line-height: 1;
      letter-spacing: normal; white-space: nowrap; direction: ltr;
      -webkit-font-feature-settings: 'liga'; -webkit-font-smoothing: antialiased;
      font-variation-settings: 'FILL' 0, 'wght' 500, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
    }
    @keyframes kifcCardIn   { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes kifcToastIn  { from { opacity: 0; transform: translate(-50%, 12px); } to { opacity: 1; transform: translate(-50%, 0); } }
    @keyframes kifcPulseRing{ 0% { transform: scale(0.6); opacity: 0.7; } 80% { transform: scale(2.2); opacity: 0; } 100% { transform: scale(2.2); opacity: 0; } }
    @keyframes kifcSpin     { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <script src="js/config.js"></script>
  <script type="text/babel" src="js/store.js"></script>
  <script type="text/babel" src="js/common.js"></script>
  <script type="text/babel" src="js/screen-b.js"></script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById('root')).render(
      <StoreProvider><ScreenB /></StoreProvider>
    );
  </script>
</body>
</html>
